/* 本页：内容容器撑满视口（封顶）而非站点默认的 52% 窄列；小屏铺满 */

	width: 100%;

#content .md-preview .fa-compress:before { content: "\f066"; }

}
#content .md-actions button,
#content .md-input-actions button {

	padding: 0 9px;
	font-size: 13px;

/* 目录（章节列表）下拉 */
.md-toc {
	position: absolute;
	top: 100%;
	right: 0;
	margin-top: 4px;
	z-index: 5;
	width: 280px;
	max-width: calc(100% - 16px);
	max-height: 50vh;
	overflow-y: auto;
	background: var(--body-bg-color);
	border: 1px solid var(--page-guide-border-color);
	border-radius: 6px;
	box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
	padding: 6px 0;
	display: none;
	scrollbar-width: thin;
	scrollbar-color: var(--content-link-hover-color) transparent;
}
.md-toc.show { display: block; }
.md-toc::-webkit-scrollbar { width: 8px; }
.md-toc::-webkit-scrollbar-thumb {
	background: var(--content-link-hover-color);
	border-radius: 4px;
}
.md-toc-item {
	display: block;
	padding: 6px 14px;
	font-size: 13px;
	line-height: 1.5;
	color: var(--content-text-color);
	text-decoration: none;
	cursor: pointer;
	border-left: 2px solid transparent;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}
.md-toc-item:hover {
	background: var(--content-code-bg-color);
	border-left-color: var(--content-link-color);
	color: var(--content-link-color);
}
.md-toc-l1 { font-weight: 600; }

/* 滚动进度条 */
#content .md-progress {

}
#content #mdProgressBar {

/* 预览正文（滚动容器） */

/* 在继承的 #content 代码块基础上做微调 */

/* highlight.js token 配色 */

}

/* 可折叠输入区 */
#content .md-input-wrap {

#content .md-input-head {

/* 全屏态 */

/* 沉浸模式：弱化页面其它区域，预览主体浮起突出到最前 */
.md-backdrop {
	position: fixed;
	top: 0; right: 0; bottom: 0; left: 0;

	background: rgba(0, 0, 0, 0.55);

	transition: opacity .25s ease, visibility .25s ease;
}
.md-backdrop.show {

}
#content .md-preview.is-immersive {
	position: fixed;
	top: 50%;
	left: 50%;

#content .md-preview.is-immersive .md-content {

/* 响应式 */
@media (max-width: 600px) {

<script src="https://cdn.staticfile.org/marked/12.0.2/marked.min.js"></script>
<script src="https://cdn.staticfile.org/highlight.js/11.9.0/highlight.min.js"></script>
<script type="text/javascript">
(function () {
	var STORAGE_CONTENT = 'md_preview_content';
	var STORAGE_FONT = 'md_preview_fontsize';
	var FONT_MIN = 12, FONT_MAX = 28, FONT_STEP = 1, FONT_DEFAULT = 16;

	function $(id) { return document.getElementById(id); }

	var preview = $('mdPreview');
	var content = $('mdContent');
	var input = $('mdInput');
	var inputWrap = $('mdInputWrap');
	var fontLabel = $('mdFontSize');
	var countEl = $('mdCount');
	var progressBar = $('mdProgressBar');
	var fullscreenBtn = $('mdFullscreen');
	var immersiveBtn = $('mdImmersive');
	var tocBtn = $('mdToc');
	var tocEl = $('mdTocPanel');

	// 沉浸模式遮罩（挂到 body 以覆盖整页，避免卡片 transform 影响其 fixed 定位）
	var backdrop = document.createElement('div');
	backdrop.className = 'md-backdrop';
	backdrop.id = 'mdBackdrop';
	document.body.appendChild(backdrop);
	var savedBodyOverflow = '';

	// 内置示例，便于首屏有内容可看
	var SAMPLE = [
		'# Markdown 预览',
		'',
		'这是一个 **所见即所得** 的 Markdown 预览工具。支持 GFM：~~删除线~~、`行内代码`、[链接](https://www.aopod.com)。',
		'',
		'## 功能特性',
		'',
		'- 实时渲染',
		'- 代码语法高亮',
		'- 字号调整 / 沉浸阅读 / 全屏阅读 / 滚动进度',
		'- [x] 已完成任务',
		'- [ ] 待办事项',
		'',
		'## 代码高亮',
		'',
		'```js',
		'function greet(name) {',
		'  return `Hello, ${name}!`;',
		'}',
		'```',
		'',
		'> 提示：预览样式跟随站点侧边栏的全局明暗主题。',
		'',
		'| 名称 | 说明 |',
		'| --- | --- |',
		'| marked | Markdown 解析 |',
		'| highlight.js | 代码高亮 |',
		''
	].join('\n');

	if (window.marked) {
		marked.setOptions({ gfm: true, breaks: true });
	}

	var currentFont = FONT_DEFAULT;
	var renderTimer = null;
	var saveTimer = null;

	function escapeHtml(s) {
		return String(s).replace(/[&<]/g, function (c) { return c === '&' ? '&amp;' : '&lt;'; });
	}

	function render() {
		var md = input.value;
		var html;
		try {
			html = window.marked ? marked.parse(md) : escapeHtml(md);
		} catch (e) {
			html = '<p style="color:#d32f2f">渲染出错：' + escapeHtml(String(e && e.message || e)) + '</p>';
		}
		content.innerHTML = html;
		if (window.hljs) {
			content.querySelectorAll('pre code').forEach(function (el) {
				try { hljs.highlightElement(el); } catch (e) {}
			});
		}
		updateCount();
		updateProgress();
		buildOutline();
	}

	function scheduleRender() {
		if (renderTimer) clearTimeout(renderTimer);
		renderTimer = setTimeout(function () {
			render();
			scheduleSave();
		}, 250);
	}

	function scheduleSave() {
		if (saveTimer) clearTimeout(saveTimer);
		saveTimer = setTimeout(function () {
			try { localStorage.setItem(STORAGE_CONTENT, input.value); } catch (e) {}
		}, 400);
	}

	function updateCount() {
		var n = input.value.length;
		countEl.textContent = n ? (n + ' 字') : '';
	}

	// 字号
	function applyFont(n) {
		currentFont = Math.max(FONT_MIN, Math.min(FONT_MAX, n));
		content.style.setProperty('--md-font-size', currentFont + 'px');
		fontLabel.textContent = currentFont + 'px';
		try { localStorage.setItem(STORAGE_FONT, String(currentFont)); } catch (e) {}
	}

	function loadFont() {
		var n = FONT_DEFAULT;
		try {
			var s = localStorage.getItem(STORAGE_FONT);
			if (s) { var p = parseInt(s, 10); if (!isNaN(p)) n = p; }
		} catch (e) {}
		applyFont(n);
	}

	function loadContent() {
		var saved = null;
		try { saved = localStorage.getItem(STORAGE_CONTENT); } catch (e) {}
		input.value = (saved != null && saved.length) ? saved : SAMPLE;
	}

	// 滚动进度
	function updateProgress() {
		var max = content.scrollHeight - content.clientHeight;
		var pct = max > 0 ? content.scrollTop / max : 0;
		if (pct < 0) pct = 0; else if (pct > 1) pct = 1;
		progressBar.style.width = (pct * 100) + '%';
	}

	// 全屏
	function isFullscreen() {
		return document.fullscreenElement === preview ||
			document.webkitFullscreenElement === preview;
	}
	function toggleFullscreen() {
		if (!isFullscreen() && isImmersive()) { exitImmersive(); }
		if (isFullscreen()) {
			(document.exitFullscreen || document.webkitExitFullscreen || function () {}).call(document);
		} else {
			var req = preview.requestFullscreen || preview.webkitRequestFullscreen;
			if (req) req.call(preview);
		}
	}
	function syncFullscreenUI() {
		var fs = isFullscreen();
		preview.classList.toggle('is-fullscreen', fs);
		fullscreenBtn.innerHTML = fs ? '<i class="fa fa-compress"></i>' : '<i class="fa fa-expand"></i>';
		fullscreenBtn.title = fs ? '退出全屏' : '全屏';
		updateProgress();
	}

	// 沉浸模式
	function isImmersive() {
		return preview.classList.contains('is-immersive');
	}
	function enterImmersive() {
		if (isFullscreen()) {
			(document.exitFullscreen || document.webkitExitFullscreen || function () {}).call(document);
		}
		savedBodyOverflow = document.body.style.overflow;
		document.body.style.overflow = 'hidden';
		preview.classList.add('is-immersive');
		backdrop.classList.add('show');
		immersiveBtn.classList.add('active');
		immersiveBtn.title = '退出沉浸';
		updateProgress();
	}
	function exitImmersive() {
		preview.classList.remove('is-immersive');
		backdrop.classList.remove('show');
		immersiveBtn.classList.remove('active');
		immersiveBtn.title = '沉浸模式';
		document.body.style.overflow = savedBodyOverflow;
	}
	function toggleImmersive() {
		if (isImmersive()) { exitImmersive(); } else { enterImmersive(); }
	}

	// 折叠输入
	function toggleInput() {
		var collapsed = inputWrap.classList.toggle('collapsed');
		$('mdToggleInput').textContent = collapsed ? '展开' : '收起';
	}

	// 目录（章节列表）
	function buildOutline() {
		var headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
		tocEl.innerHTML = '';
		if (!headings.length) {
			tocEl.innerHTML = '<div class="md-toc-empty">暂无章节</div>';
			return;
		}
		Array.prototype.forEach.call(headings, function (h) {
			var level = parseInt(h.tagName.substring(1), 10);
			var item = document.createElement('a');
			item.className = 'md-toc-item md-toc-l' + level;
			item.textContent = h.textContent;
			item.setAttribute('href', 'javascript:void(0)');
			item.addEventListener('click', function () {
				jumpToHeading(h);
				closeOutline();
			});
			tocEl.appendChild(item);
		});
	}
	function jumpToHeading(h) {
		var cr = content.getBoundingClientRect();
		var er = h.getBoundingClientRect();
		var padTop = parseFloat(getComputedStyle(content).paddingTop) || 0;
		// 仅滚动预览容器自身（在普通/沉浸/全屏下都适用）
		content.scrollTop += (er.top - cr.top) - padTop;
	}
	function openOutline() {
		tocEl.classList.add('show');
		tocBtn.classList.add('active');
	}
	function closeOutline() {
		tocEl.classList.remove('show');
		tocBtn.classList.remove('active');
	}
	function toggleOutline() {
		if (tocEl.classList.contains('show')) { closeOutline(); } else { openOutline(); }
	}

	// 事件绑定
	input.addEventListener('input', scheduleRender);
	$('mdFontDec').addEventListener('click', function () { applyFont(currentFont - FONT_STEP); });
	$('mdFontInc').addEventListener('click', function () { applyFont(currentFont + FONT_STEP); });
	fullscreenBtn.addEventListener('click', toggleFullscreen);
	document.addEventListener('fullscreenchange', syncFullscreenUI);
	document.addEventListener('webkitfullscreenchange', syncFullscreenUI);
	immersiveBtn.addEventListener('click', toggleImmersive);
	backdrop.addEventListener('click', exitImmersive);
	document.addEventListener('keydown', function (e) {
		if (e.key === 'Escape' || e.keyCode === 27) {
			if (tocEl.classList.contains('show')) { e.preventDefault(); closeOutline(); return; }
			if (isImmersive()) { e.preventDefault(); exitImmersive(); }
		}
	});
	tocBtn.addEventListener('click', function (e) {
		e.stopPropagation();
		toggleOutline();
	});
	document.addEventListener('click', function (e) {
		if (tocEl.classList.contains('show') && !tocEl.contains(e.target) && !tocBtn.contains(e.target)) {
			closeOutline();
		}
	});
	$('mdSample').addEventListener('click', function () {
		input.value = SAMPLE;
		render();
		scheduleSave();
	});
	$('mdClear').addEventListener('click', function () {
		input.value = '';
		render();
		scheduleSave();
		input.focus();
	});
	$('mdToggleInput').addEventListener('click', toggleInput);
	content.addEventListener('scroll', updateProgress, { passive: true });
	window.addEventListener('resize', updateProgress);

	// 初始化（marked / highlight.js 已在上方以阻塞方式加载）
	loadFont();
	loadContent();
	render();
})();
</script>
